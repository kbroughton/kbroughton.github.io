<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="3" fill="#ff5555" opacity="0.8"/>

  <!-- Decorative dots -->
  <g opacity="0.1" fill="#6272a4">
    <circle cx="60" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="60" cy="140" r="2"/><circle cx="120" cy="140" r="2"/>
    <circle cx="1080" cy="80" r="2"/><circle cx="1140" cy="80" r="2"/><circle cx="1080" cy="140" r="2"/><circle cx="1140" cy="140" r="2"/>
    <circle cx="60" cy="300" r="2"/><circle cx="120" cy="300" r="2"/>
    <circle cx="1080" cy="300" r="2"/><circle cx="1140" cy="300" r="2"/>
  </g>

  <!-- Left: SMTP port 587 label -->
  <g transform="translate(200, 200)">
    <rect x="-80" y="-40" width="160" height="80" rx="8" fill="#ff5555" opacity="0.08"/>
    <rect x="-80" y="-40" width="160" height="80" rx="8" fill="none" stroke="#ff5555" stroke-width="2"/>
    <text y="-10" text-anchor="middle" fill="#ff5555" font-size="13" font-weight="600" letter-spacing="1">SMTP :587</text>
    <text y="14" text-anchor="middle" fill="#ff5555" font-size="12" opacity="0.7">IMAP :993</text>
    <text y="33" text-anchor="middle" fill="#6272a4" font-size="11">legacy protocol</text>
    <text y="65" text-anchor="middle" fill="#6272a4" font-size="13" letter-spacing="0.5">LEGACY AUTH</text>
  </g>

  <!-- Arrow -->
  <line x1="285" y1="200" x2="380" y2="200" stroke="#6272a4" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="376,194 388,200 376,206" fill="#6272a4"/>

  <!-- Center: App password key -->
  <g transform="translate(490, 200)" filter="url(#glow)">
    <!-- key shaft -->
    <rect x="-10" y="-8" width="70" height="16" rx="4" fill="none" stroke="#f1fa8c" stroke-width="2.5"/>
    <!-- key teeth -->
    <rect x="20" y="8" width="8" height="12" rx="2" fill="none" stroke="#f1fa8c" stroke-width="2"/>
    <rect x="36" y="8" width="8" height="18" rx="2" fill="none" stroke="#f1fa8c" stroke-width="2"/>
    <rect x="50" y="8" width="8" height="10" rx="2" fill="none" stroke="#f1fa8c" stroke-width="2"/>
    <!-- key bow (circle) -->
    <circle cx="-24" cy="0" r="20" fill="#f1fa8c" opacity="0.1"/>
    <circle cx="-24" cy="0" r="20" fill="none" stroke="#f1fa8c" stroke-width="2.5"/>
    <circle cx="-24" cy="0" r="8" fill="none" stroke="#f1fa8c" stroke-width="2"/>

    <!-- NO SCOPE label above -->
    <rect x="-55" y="-60" width="110" height="24" rx="4" fill="#ff5555" opacity="0.15"/>
    <text x="0" y="-43" text-anchor="middle" fill="#ff5555" font-size="12" letter-spacing="1">NO SCOPE LIMIT</text>

    <!-- never expires label below -->
    <text x="0" y="55" text-anchor="middle" fill="#f1fa8c" font-size="13" letter-spacing="0.5">APP PASSWORD</text>
    <text x="0" y="73" text-anchor="middle" fill="#6272a4" font-size="11">never expires · bypasses 2FA</text>
  </g>

  <!-- Arrow to inbox -->
  <line x1="570" y1="200" x2="665" y2="200" stroke="#6272a4" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="661,194 673,200 661,206" fill="#6272a4"/>

  <!-- Right: full inbox access -->
  <g transform="translate(760, 180)">
    <!-- stack of envelopes suggesting full access -->
    <g transform="translate(-10,-10)" opacity="0.4">
      <rect x="-45" y="-30" width="90" height="60" rx="6" fill="none" stroke="#ff5555" stroke-width="1.5"/>
      <polyline points="-45,-30 0,10 45,-30" fill="none" stroke="#ff5555" stroke-width="1.5"/>
    </g>
    <g transform="translate(-5,-5)" opacity="0.65">
      <rect x="-45" y="-30" width="90" height="60" rx="6" fill="none" stroke="#ff5555" stroke-width="1.5"/>
      <polyline points="-45,-30 0,10 45,-30" fill="none" stroke="#ff5555" stroke-width="1.5"/>
    </g>
    <rect x="-45" y="-30" width="90" height="60" rx="6" fill="#ff5555" opacity="0.08"/>
    <rect x="-45" y="-30" width="90" height="60" rx="6" fill="none" stroke="#ff5555" stroke-width="2.5"/>
    <polyline points="-45,-30 0,10 45,-30" fill="none" stroke="#ff5555" stroke-width="2"/>
    <text y="50" text-anchor="middle" fill="#ff5555" font-size="13" letter-spacing="0.5">FULL INBOX</text>
    <text y="68" text-anchor="middle" fill="#6272a4" font-size="11">read · send · delete · modify</text>
  </g>

  <!-- Right panel: comparison pills -->
  <g transform="translate(960, 100)">
    <text x="100" y="0" text-anchor="middle" fill="#6272a4" font-size="12" letter-spacing="1">VS OAUTH2 SCOPE</text>

    <!-- App password row -->
    <rect x="0" y="14" width="200" height="26" rx="5" fill="#ff5555" opacity="0.15"/>
    <rect x="0" y="14" width="200" height="26" rx="5" fill="none" stroke="#ff5555" stroke-width="1.5"/>
    <text x="100" y="32" text-anchor="middle" fill="#ff5555" font-size="12">App password: full mailbox</text>

    <!-- OAuth row -->
    <rect x="50" y="54" width="100" height="26" rx="5" fill="#50fa7b" opacity="0.15"/>
    <rect x="50" y="54" width="100" height="26" rx="5" fill="none" stroke="#50fa7b" stroke-width="1.5"/>
    <text x="100" y="72" text-anchor="middle" fill="#50fa7b" font-size="12">gmail.readonly</text>

    <rect x="68" y="94" width="64" height="26" rx="5" fill="#50fa7b" opacity="0.15"/>
    <rect x="68" y="94" width="64" height="26" rx="5" fill="none" stroke="#50fa7b" stroke-width="1.5"/>
    <text x="100" y="112" text-anchor="middle" fill="#50fa7b" font-size="12">gmail.send</text>

    <line x1="0" y1="138" x2="200" y2="138" stroke="#6272a4" stroke-width="1" opacity="0.3"/>
    <text x="100" y="158" text-anchor="middle" fill="#6272a4" font-size="11">scope is a hard boundary</text>
    <text x="100" y="174" text-anchor="middle" fill="#6272a4" font-size="11">app passwords have none</text>
  </g>

  <text x="600" y="372" text-anchor="middle" fill="#6272a4" font-size="14" letter-spacing="2">
    LEGACY AUTH  •  ATTACK SURFACE  •  GOOGLE WORKSPACE
  </text>
</svg>
