<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9370db" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8be9fd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5ec8e5" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.12" fill="#bd93f9">
    <circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="240" cy="60" r="2"/>
    <circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="180" cy="120" r="2"/><circle cx="240" cy="120" r="2"/>
    <circle cx="60" cy="180" r="2"/><circle cx="120" cy="180" r="2"/><circle cx="180" cy="180" r="2"/>
    <circle cx="960" cy="60" r="2"/><circle cx="1020" cy="60" r="2"/><circle cx="1080" cy="60" r="2"/><circle cx="1140" cy="60" r="2"/>
    <circle cx="960" cy="120" r="2"/><circle cx="1020" cy="120" r="2"/><circle cx="1080" cy="120" r="2"/><circle cx="1140" cy="120" r="2"/>
    <circle cx="960" cy="180" r="2"/><circle cx="1020" cy="180" r="2"/><circle cx="1080" cy="180" r="2"/>
    <circle cx="960" cy="280" r="2"/><circle cx="1020" cy="280" r="2"/><circle cx="1080" cy="280" r="2"/>
    <circle cx="60" cy="280" r="2"/><circle cx="120" cy="280" r="2"/><circle cx="180" cy="280" r="2"/>
  </g>

  <!-- === ENVELOPE (left) === -->
  <g transform="translate(210, 160)">
    <!-- envelope body -->
    <rect x="-70" y="-50" width="140" height="100" rx="8" fill="none" stroke="url(#purple-glow)" stroke-width="2.5"/>
    <!-- envelope flap -->
    <polyline points="-70,-50 0,20 70,-50" fill="none" stroke="url(#purple-glow)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- bottom creases -->
    <line x1="-70" y1="50" x2="-10" y2="5" stroke="#bd93f9" stroke-width="1.5" opacity="0.5"/>
    <line x1="70" y1="50" x2="10" y2="5" stroke="#bd93f9" stroke-width="1.5" opacity="0.5"/>
    <!-- label -->
    <text y="75" text-anchor="middle" fill="#bd93f9" font-size="14" letter-spacing="1" opacity="0.8">INBOX</text>
  </g>

  <!-- Arrow: envelope → lock -->
  <g filter="url(#glow)">
    <line x1="310" y1="200" x2="430" y2="200" stroke="#6272a4" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="430,194 442,200 430,206" fill="#6272a4"/>
  </g>

  <!-- === LOCK (center) === -->
  <g transform="translate(540, 170)">
    <!-- shackle -->
    <path d="M-28,-40 Q-28,-80 0,-80 Q28,-80 28,-40 L28,-10 L-28,-10 Z"
          fill="none" stroke="url(#cyan-glow)" stroke-width="3" stroke-linecap="round"/>
    <!-- body -->
    <rect x="-40" y="-10" width="80" height="68" rx="8" fill="url(#cyan-glow)" opacity="0.15"/>
    <rect x="-40" y="-10" width="80" height="68" rx="8" fill="none" stroke="url(#cyan-glow)" stroke-width="2.5"/>
    <!-- keyhole -->
    <circle cx="0" cy="22" r="10" fill="none" stroke="#8be9fd" stroke-width="2.5"/>
    <rect x="-5" y="28" width="10" height="14" rx="2" fill="#8be9fd" opacity="0.8"/>
    <!-- label -->
    <text y="82" text-anchor="middle" fill="#8be9fd" font-size="14" letter-spacing="1" opacity="0.8">SECRET MANAGER</text>
  </g>

  <!-- Arrow: lock → vault -->
  <g filter="url(#glow)">
    <line x1="622" y1="200" x2="742" y2="200" stroke="#6272a4" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="742,194 754,200 742,206" fill="#6272a4"/>
  </g>

  <!-- === VAULT / CYLINDER (right) === -->
  <g transform="translate(870, 160)">
    <!-- cylinder body -->
    <rect x="-55" y="-20" width="110" height="85" rx="6" fill="url(#green-glow)" opacity="0.1"/>
    <rect x="-55" y="-20" width="110" height="85" rx="6" fill="none" stroke="url(#green-glow)" stroke-width="2.5"/>
    <!-- top ellipse -->
    <ellipse cx="0" cy="-20" rx="55" ry="14" fill="url(#green-glow)" opacity="0.2"/>
    <ellipse cx="0" cy="-20" rx="55" ry="14" fill="none" stroke="url(#green-glow)" stroke-width="2.5"/>
    <!-- shelf lines -->
    <line x1="-40" y1="10" x2="40" y2="10" stroke="#50fa7b" stroke-width="1.5" opacity="0.4"/>
    <line x1="-40" y1="30" x2="40" y2="30" stroke="#50fa7b" stroke-width="1.5" opacity="0.4"/>
    <!-- label -->
    <text y="90" text-anchor="middle" fill="#50fa7b" font-size="14" letter-spacing="1" opacity="0.8">LEAST PRIVILEGE</text>
  </g>

  <!-- Bottom tag line -->
  <text x="600" y="355" text-anchor="middle" fill="#6272a4" font-size="15" letter-spacing="2">
    GCP  •  OAUTH2  •  PER-SCOPE PROJECT ISOLATION
  </text>

  <!-- Subtle top border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#purple-glow)" opacity="0.7"/>
</svg>
