# Gmail Bot Configuration
# Copy this file to gmail-bot.conf and fill in your values.
# All scripts source this file — do not commit it with real values.

# ── Project naming ─────────────────────────────────────────────────────────────
# Projects are named: ${PROJECT_PREFIX}-{reader|sender}-${PROJECT_ORG}-${ENV}
# If PROJECT_ORG is empty, the org infix is omitted:
#   with org:    email-bot-reader-acme-stg
#   without org: email-bot-reader-stg
PROJECT_PREFIX="email-bot"
PROJECT_ORG=""           # optional org identifier (e.g. acme, myco) — leave blank to omit

# ── Environment names ──────────────────────────────────────────────────────────
ENV_STG="stg"
ENV_PRD="prd"

# ── GCP billing and folder ─────────────────────────────────────────────────────
BILLING_ACCOUNT=""       # e.g. 012345-ABCDEF-789012
STG_FOLDER_ID=""         # optional — leave blank to create projects without a folder parent
PRD_FOLDER_ID=""

# ── Shared GCP projects ────────────────────────────────────────────────────────
OBSERVABILITY_PROJECT="" # project receiving logging/tracing/metrics (e.g. my-observability)

# ── Access control ─────────────────────────────────────────────────────────────
ENGINEERING_GROUP=""     # Google group to grant secret read access (e.g. group:eng@example.com)

# ── Bot identity ───────────────────────────────────────────────────────────────
BOT_ACCOUNT_EMAIL=""     # Gmail account the bot authenticates as (e.g. bot@example.com)
