baseURL: "https://kbroughton.github.io/"
languageCode: en-us
title: "Kesten Broughton"
theme: PaperMod
paginate: 10

params:
  author: Kesten Broughton
  description: "Secure AI development patterns from a security staff engineer — CVE researcher, FWD:cloudsec speaker, CIS contributor."
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  socialIcons:
    - name: github
      url: "https://github.com/kbroughton"

  homeInfoParams:
    Title: "Security engineering in a World Full of Bots."
    Content: |
      I'm Kesten — staff security engineer, 15 years in.
      Two-time **[FWD:cloudsec](https://fwdcloudsec.org)** speaker. CVE finder. Dozens of accepted bug bounties.
      Contributor to **CIS benchmarks** (yes, the ones your compliance team emails you about).

      This blog is about **secure AI development patterns** — what actually changes when you bolt agentic systems
      onto infrastructure that was already hard to secure, and how to not hand the keys to everyone
      who finds your refresh token in a GitHub search.

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 1
    - name: Tags
      url: /tags/
      weight: 2
    - name: About
      url: /about/
      weight: 3

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    style: dracula
    lineNos: false
    noClasses: false
